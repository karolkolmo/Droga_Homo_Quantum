    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.85);
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --accent-gold: #b38c4a;
            --accent-gold-light: #d4a85c;
            --accent-blue: #6c7a9d;
            --accent-cyan: #22d3ee;
            --accent-purple: #a78bfa;
            --border-color: rgba(255,255,255,0.08);
            --shadow-glow: 0 0 40px rgba(179, 140, 74, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1429 50%, #0a1a2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.75;
        }

        /* Tło gwiazd */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, rgba(255,255,255,0.4) 0, transparent 1px),
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0, transparent 1px),
                radial-gradient(2px 2px at 40% 60%, rgba(255,255,255,0.25) 0, transparent 2px),
                radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.35) 0, transparent 1px),
                radial-gradient(1px 1px at 80% 80%, rgba(255,255,255,0.3) 0, transparent 1px),
                radial-gradient(2px 2px at 30% 80%, rgba(179, 140, 74, 0.2) 0, transparent 2px),
                radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4) 0, transparent 1px),
                radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.2) 0, transparent 1px);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }

        /* Layout z sidebarem */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(13,20,41,0.9) 100%);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .sidebar-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .sidebar-nav { list-style: none; }

        .sidebar-nav li { margin-bottom: 0.25rem; }

        .sidebar-nav a {
            display: block;
            padding: 0.5rem 0.85rem;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 400;
            transition: all 0.25s ease;
            border-left: 2px solid transparent;
        }

        .sidebar-nav a:hover {
            color: var(--accent-gold-light);
            background: rgba(179, 140, 74, 0.08);
            border-left-color: var(--accent-gold);
        }

        .sidebar-nav a.active {
            color: var(--accent-gold-light);
            background: rgba(179, 140, 74, 0.12);
            border-left-color: var(--accent-gold);
            font-weight: 500;
        }

        .sidebar-divider {
            height: 1px;
            background: var(--border-color);
            margin: 1.25rem 0;
        }

        .sidebar-label {
            font-size: 0.675rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1rem 0 0.5rem;
            font-weight: 600;
        }

        /* Główna treść */
        .main-content {
            padding: 3rem 4rem;
            max-width: 1000px;
        }

        /* Hero section */
        .hero {
            text-align: center;
            padding: 4rem 0 3rem;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-light) 50%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
            letter-spacing: 0.03em;
        }

        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .hero-badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.35rem 1rem;
            background: rgba(179, 140, 74, 0.15);
            border: 1px solid rgba(179, 140, 74, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--accent-gold-light);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Karty sekcji */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .section-card:hover {
            border-color: rgba(179, 140, 74, 0.25);
            box-shadow: var(--shadow-glow);
        }

        .section-card.animate {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .section-card.animate.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Nagłówki sekcji */
        .section-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.85rem;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .section-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--accent-cyan);
            margin: 1.75rem 0 0.75rem;
            font-weight: 600;
        }

        .section-card h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-purple);
            margin: 1.25rem 0 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Tekst */
        .section-card p {
            color: var(--text-primary);
            font-size: 0.975rem;
            margin-bottom: 1rem;
        }

        .section-card strong {
            color: var(--accent-gold-light);
            font-weight: 600;
        }

        /* Listy */
        .section-card ul {
            list-style: none;
            margin: 1rem 0;
        }

        .section-card ul li {
            padding: 0.5rem 0 0.5rem 1.75rem;
            position: relative;
            color: var(--text-secondary);
        }

        .section-card ul li::before {
            content: '✦';
            position: absolute;
            left: 0;
            color: var(--accent-gold);
            font-size: 0.8rem;
        }

        .section-card ol {
            counter-reset: step-counter;
            list-style: none;
            margin: 1rem 0;
        }

        .section-card ol li {
            padding: 0.75rem 0 0.75rem 3rem;
            position: relative;
            color: var(--text-primary);
        }

        .section-card ol li::before {
            counter-increment: step-counter;
            content: counter(step-counter);
            position: absolute;
            left: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-light) 100%);
            color: #0a0e1a;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Blockquote */
        .highlight-box {
            background: linear-gradient(135deg, rgba(179, 140, 74, 0.1) 0%, rgba(34, 211, 238, 0.08) 100%);
            border-left: 3px solid var(--accent-gold);
            padding: 1.25rem 1.5rem;
            border-radius: 0 12px 12px 0;
            margin: 1.5rem 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        .result-box {
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.15) 0%, rgba(179, 140, 74, 0.1) 100%);
            border: 1px solid rgba(179, 140, 74, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .result-box strong {
            color: var(--accent-cyan);
        }

        /* Glossary akordeon */
        .glossary-item {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 0.75rem;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .glossary-item:hover {
            border-color: rgba(179, 140, 74, 0.3);
        }

        .glossary-term {
            width: 100%;
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--accent-gold-light);
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            display: flex;
